<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeRead</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h1 class="title">TypeRead</h1>
    <button id="start-typing" class="cta">Start Typing Mode</button>
    <div class="instructions">
      <h2>How it works</h2>
      <ol>
        <li>Click "Start Typing Mode"</li>
        <li>Hover and select any paragraph on the page</li>
        <li>Rewrite the paragraph to practice typing</li>
      </ol>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
